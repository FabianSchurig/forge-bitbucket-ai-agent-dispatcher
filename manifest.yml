modules:
  trigger:
    - key: pr-comment-trigger
      function: run-dispatcher
      events:
        - avi:bitbucket:created:pullrequest-comment

  bitbucket:projectSettingsMenuPage:
    - key: settings-page
      resource: settings-ui
      render: native
      title: AI Agent Dispatcher Settings
      resolver:
        function: settings-resolver

  function:
    - key: run-dispatcher
      handler: index.runDispatcher

    - key: settings-resolver
      handler: index.settingsResolver

app:
  id: ari:cloud:ecosystem::app/c692fc30-e7f5-40f2-ab84-733a61f45989 
  runtime:
    name: nodejs24.x

resources:
  - key: settings-ui
    path: src/settings.tsx

permissions:
  scopes:
    - read:pullrequest:bitbucket
    - read:repository:bitbucket
    - read:pipeline:bitbucket
    - write:pipeline:bitbucket
    - write:pullrequest:bitbucket
    - storage:app
  external:
    fetch:
      # Wildcard allows outbound requests to any domain.  This is a temporary
      # workaround until Atlassian promotes Customer-Managed Egress from the
      # roadmap to preview, at which point we can switch to the `configurable`
      # block and let workspace admins approve specific Jenkins hosts at runtime.
      backend:
        - '*'
