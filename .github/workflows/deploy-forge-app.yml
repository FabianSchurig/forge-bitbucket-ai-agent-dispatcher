name: Deploy Atlassian Forge App

on:
  push:
    branches:
      - '**' # Lint & test run on every branch push for pre-merge validation
  pull_request: # Also run on pull requests to validate changes before merge

# Prevent overlapping deploys to the shared development environment.
# Only one deploy job runs at a time; newer pushes cancel in-progress ones.
concurrency:
  group: forge-deploy-development
  cancel-in-progress: true

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

  deploy-and-install:
    name: Deploy & Install (Development)
    runs-on: ubuntu-latest
    needs: test # Only deploy when tests pass
    # Deploy on every branch push and on pull requests so changes can be
    # validated in the shared development environment before merging.
    # The install --upgrade step is gated to main only (see below).
    permissions:
      contents: read

    # These exact environment variables are intercepted by the Forge CLI
    # to authenticate the headless session.
    env:
      FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
      FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Install Atlassian Forge CLI
        run: npm install -g @forge/cli

      - name: Disable Forge Usage Analytics (CI standard)
        run: forge settings set usage-analytics false

      - name: Lint Forge Code
        run: forge lint

      - name: Deploy to Development Environment
        run: forge deploy -e development

      - name: Upgrade Installation on Workspace
        # Only upgrade the live workspace installation from main so that
        # PR deploys can validate the build without affecting the installed app.
        if: github.ref == 'refs/heads/main'
        # The --non-interactive flag prevents the pipeline from hanging on UI prompts.
        # The --upgrade flag updates the code on the existing workspace installation.
        # NOTE: The app must have been deployed and installed manually at least once
        # before this step will succeed (see README for first-time setup instructions).
        run: |
          forge install \
            --upgrade \
            --non-interactive \
            --site bitbucket.org/fabian-schurig \
            --product bitbucket \
            --environment development
