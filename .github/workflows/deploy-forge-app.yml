name: Deploy Atlassian Forge App

on:
  push:
    branches:
      - main # Only push to main triggers the workflow (avoids double-run on PR branches)
  pull_request: # PRs trigger the full pipeline for pre-merge validation

# Use a per-ref/PR concurrency group so:
# - Rapid pushes to the same branch/PR cancel the previous in-progress run (good)
# - Different PRs run in parallel and do NOT cancel each other (good)
concurrency:
  group: forge-deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

  deploy-and-install:
    name: Deploy & Install (Development)
    runs-on: ubuntu-latest
    needs: test # Only deploy when tests pass
    # Deploy on push to main and on pull requests from the same repository.
    # Fork PRs are excluded because GitHub does not expose secrets to workflows
    # triggered by untrusted forks, which would cause forge deploy to fail.
    # Push events here are always main (see the on.push.branches filter above).
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read

    # These exact environment variables are intercepted by the Forge CLI
    # to authenticate the headless session.
    env:
      FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
      FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Project Dependencies
        # @forge/cli is listed in devDependencies so npm ci installs it into
        # node_modules/.bin/forge. GitHub Actions does NOT automatically add
        # node_modules/.bin to PATH for shell steps (only npm run scripts get it).
        # We append it to $GITHUB_PATH here so every subsequent step can invoke
        # the forge binary directly without a global install.
        run: |
          npm ci
          echo "$GITHUB_WORKSPACE/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Disable Forge Usage Analytics (CI standard)
        run: forge settings set usage-analytics false

      - name: Lint Forge Code
        run: forge lint

      - name: Deploy to Development Environment
        run: forge deploy -e development

      - name: Upgrade Installation on Workspace
        # Only upgrade the live workspace installation from main so that
        # PR deploys can validate the build without affecting the installed app.
        if: github.ref == 'refs/heads/main'
        # The --non-interactive flag prevents the pipeline from hanging on UI prompts.
        # The --upgrade flag updates the code on the existing workspace installation.
        # NOTE: The app must have been deployed and installed manually at least once
        # before this step will succeed (see README for first-time setup instructions).
        run: |
          forge install \
            --upgrade \
            --non-interactive \
            --site bitbucket.org/fabian-schurig \
            --product bitbucket \
            --environment development
